name: Build ESP32-S3 PM Libraries

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-s3:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout framework-pm
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ninja-build ccache

      - name: Clone esp32-arduino-lib-builder
        run: |
          git clone --depth 1 https://github.com/espressif/esp32-arduino-lib-builder.git ../lib-builder

      - name: Override S3 defconfig with PM
        run: |
          # Append PM + BLE sleep settings to the S3 chip defconfig
          cat >> ../lib-builder/configs/defconfig.common << 'PMEOF'

          # --- Power Management (MV custom) ---
          CONFIG_PM_ENABLE=y
          CONFIG_PM_DFS_INIT_AUTO=y
          CONFIG_PM_POWER_DOWN_CPU_IN_LIGHT_SLEEP=y
          CONFIG_PM_POWER_DOWN_TAGMEM_IN_LIGHT_SLEEP=y
          CONFIG_FREERTOS_USE_TICKLESS_IDLE=y
          CONFIG_FREERTOS_IDLE_TIME_BEFORE_SLEEP=3
          CONFIG_BT_CTRL_MODEM_SLEEP=y
          CONFIG_BT_CTRL_MODEM_SLEEP_MODE_1=y
          CONFIG_BT_CTRL_SLEEP_MODE_EFF=1
          CONFIG_BT_CTRL_SLEEP_CLOCK_EFF=1
          CONFIG_BT_CTRL_MAIN_XTAL_PU_DURING_LIGHT_SLEEP=y
          PMEOF

          echo "=== S3 defconfig (last 15 lines) ==="
          tail -15 ../lib-builder/configs/defconfig.common

      - name: Build ESP32-S3 IDF libs only
        run: |
          cd ../lib-builder
          echo "Building ESP32-S3 IDF libraries (this may take 1-2 hours)..."
          ./build.sh -t esp32s3 -b idf-libs -D debug 2>&1 | tail -100
          echo "=== Build completed, listing output ==="
          ls -la out/tools/sdk/esp32s3/ 2>/dev/null || echo "Checking build dir..."
          find build -name "*.a" | head -20

      - name: Copy built libs + sdkconfig.h back to framework
        run: |
          OUT=../lib-builder/out/tools/sdk/esp32s3/
          if [ -d "$OUT" ]; then
            echo "Found build output at $OUT"
            rm -rf tools/sdk/esp32s3/*
            cp -r "$OUT"/* tools/sdk/esp32s3/
            echo "Updated framework S3 SDK files:"
            ls -la tools/sdk/esp32s3/
          else
            echo "ERROR: Build output not found at $OUT"
            echo "Searching for .a files..."
            find ../lib-builder -name "libesp_system.a" -type f 2>/dev/null
            exit 1
          fi

      - name: Commit and push updated libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/Mymetu/framework-arduinoespressif32-pm.git"
          git add tools/sdk/esp32s3/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build: recompiled S3 IDF libs with CONFIG_PM_ENABLE=y, BLE modem sleep, Tickless Idle"
            git push
            echo "Pushed updated S3 PM libs!"
          fi
