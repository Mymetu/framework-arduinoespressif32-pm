name: Build ESP32-S3 PM Libraries

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-s3:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout framework-pm
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ninja-build ccache jq

      - name: Clone esp32-arduino-lib-builder
        run: |
          cd /home/runner/work
          git clone --depth 1 https://github.com/espressif/esp32-arduino-lib-builder.git lib-builder

      - name: Append PM settings to S3 defconfig
        run: |
          cat >> /home/runner/work/lib-builder/configs/defconfig.common << 'PMEOF'

          # --- Power Management (MV custom) ---
          CONFIG_PM_ENABLE=y
          CONFIG_PM_DFS_INIT_AUTO=y
          CONFIG_PM_POWER_DOWN_CPU_IN_LIGHT_SLEEP=y
          CONFIG_PM_POWER_DOWN_TAGMEM_IN_LIGHT_SLEEP=y
          CONFIG_FREERTOS_USE_TICKLESS_IDLE=y
          CONFIG_FREERTOS_IDLE_TIME_BEFORE_SLEEP=3
          CONFIG_BT_CTRL_MODEM_SLEEP=y
          CONFIG_BT_CTRL_MODEM_SLEEP_MODE_1=y
          CONFIG_BT_CTRL_SLEEP_MODE_EFF=1
          CONFIG_BT_CTRL_SLEEP_CLOCK_EFF=1
          CONFIG_BT_CTRL_MAIN_XTAL_PU_DURING_LIGHT_SLEEP=y
          # Suppress -Werror in third-party components (esp_matter etc.)
          CONFIG_COMPILER_DISABLE_GCC_WARNINGS=y
          CONFIG_COMPILER_WARNINGS_AS_ERRORS=n
          # Disable Matter (we don't need it, and it has Werror=format issues)
          CONFIG_ENABLE_MATTER=n
          CONFIG_ESP_MATTER_ENABLE=n
          PMEOF
          echo "=== defconfig.common (last 15 lines) ==="
          tail -15 /home/runner/work/lib-builder/configs/defconfig.common

      - name: Build ESP32-S3 IDF libs (IDF v5.1, matching ssp97 framework ABI)
        run: |
          cd /home/runner/work/lib-builder
          unset GITHUB_REPOSITORY_OWNER
          unset GITHUB_TOKEN
          # Use the actual branch name for Arduino core v2.x (IDF v5.1 era)
          export AR_SOURCE_BRANCH=idf-release/v5.1
          echo "Building ESP32-S3 IDF libraries with IDF v5.1, Arduino core $AR_SOURCE_BRANCH (this may take 1-2 hours)..."
          set +e
          ./build.sh -t esp32s3 -I release/v5.1 -b idf-libs > /tmp/build.log 2>&1 || true
          BUILD_EXIT=$?
          echo "=== BUILD LOG (head 80) ==="
          head -80 /tmp/build.log
          echo "=== BUILD LOG (tail 80) ==="
          tail -80 /tmp/build.log
          set -e
          echo "=== Build exit code: $BUILD_EXIT ==="
          ls -la out/tools/sdk/esp32s3/ 2>/dev/null || echo "No out dir"
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "=== Final sdkconfig (grep warn/error/matter/pm) ==="
            grep -i "warn\|error\|matter\|pm_enable\|pm_\|BT_CTRL" build/sdkconfig 2>/dev/null || echo "(no sdkconfig)"
            echo "=== Build error log ==="
            cat build/log/idf_py_stderr_output_* 2>/dev/null | tail -50 || echo "(no error log)"
          fi
          find build -name "libesp_system.a" 2>/dev/null | head -5
          find out -name "*.a" 2>/dev/null | head -10

      - name: Copy built libs + sdkconfig.h back to framework
        run: |
          SRC=/home/runner/work/lib-builder/out/tools/esp32-arduino-libs/esp32s3/
          DST=tools/sdk/esp32s3/
          if [ -d "$SRC" ]; then
            echo "Found build output at $SRC"
            echo "Contents:"
            ls -la $SRC/
            for flash_mode in dio_qspi dio_opi qio_qspi qio_opi opi_qspi opi_opi; do
              if [ -d "$SRC/$flash_mode" ]; then
                rm -rf "$DST/$flash_mode"
                mkdir -p "$DST/$flash_mode"
                cp "$SRC/$flash_mode/"*.a "$DST/$flash_mode/" 2>/dev/null || true
                cp "$SRC/lib/"*.a "$DST/$flash_mode/" 2>/dev/null || true
                echo "  $flash_mode: $(ls $DST/$flash_mode/ 2>/dev/null | wc -l) libs"
              fi
            done
            find "$SRC" -name "sdkconfig.h" -exec cp {} "$DST/" \; 2>/dev/null || true
            echo "Updated framework S3 SDK files"
          else
            echo "ERROR: Build output not found at $SRC"
            find /home/runner/work/lib-builder/out -type d 2>/dev/null | head -20
            exit 1
          fi

      - name: Commit and push updated libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/Mymetu/framework-arduinoespressif32-pm.git"
          git add tools/sdk/esp32s3/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build: recompiled S3 IDF libs with CONFIG_PM_ENABLE=y, BLE modem sleep, Tickless Idle"
            git push
            echo "Pushed updated S3 PM libs!"
          fi
