name: Build ESP32-S3 PM Libraries
# Re-trigger: revert to b90dda1 (TAGMEM fix + BT LPCLK)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-s3:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout framework-pm
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ninja-build ccache jq
          pip install --user setuptools pyserial click cryptography future pyparsing pyelftools

      - name: Clone esp32-arduino-lib-builder (IDF v4.4 branch)
        run: |
          cd /home/runner/work
          git clone --depth 1 -b release/v4.4 https://github.com/espressif/esp32-arduino-lib-builder.git lib-builder

      - name: Append PM settings to S3 defconfig
        run: |
          cat >> /home/runner/work/lib-builder/configs/defconfig.common << 'PMEOF'

          # --- Power Management (MV custom, based on C3 PM framework analysis) ---
          CONFIG_PM_ENABLE=y
          CONFIG_PM_DFS_INIT_AUTO=y
          CONFIG_PM_POWER_DOWN_CPU_IN_LIGHT_SLEEP=y
          # TAGMEM power down DISABLED: S3 BT controller needs TAG memory during light sleep
          # CONFIG_PM_POWER_DOWN_TAGMEM_IN_LIGHT_SLEEP is not set
          CONFIG_PM_SLP_DISABLE_GPIO=y
          CONFIG_FREERTOS_USE_TICKLESS_IDLE=y
          CONFIG_FREERTOS_IDLE_TIME_BEFORE_SLEEP=3
          # BLE modem sleep with Main XTAL as low-power clock (required for BLE timing accuracy)
          CONFIG_BT_CTRL_MODEM_SLEEP=y
          CONFIG_BT_CTRL_MODEM_SLEEP_MODE_1=y
          CONFIG_BT_CTRL_LPCLK_SEL_MAIN_XTAL=y
          CONFIG_BT_CTRL_SLEEP_MODE_EFF=1
          CONFIG_BT_CTRL_SLEEP_CLOCK_EFF=1
          CONFIG_BT_CTRL_MAIN_XTAL_PU_DURING_LIGHT_SLEEP=y
          # Disable dangerous sleep options (would break BT or cause wake-up crash)
          # CONFIG_ESP_SLEEP_POWER_DOWN_FLASH is not set
          # CONFIG_ESP_PHY_MAC_BB_PD is not set
          # Sleep workarounds (from C3 PM config)
          CONFIG_ESP_SLEEP_GPIO_RESET_WORKAROUND=y
          CONFIG_ESP_SLEEP_FLASH_LEAKAGE_WORKAROUND=y
          CONFIG_ESP_SLEEP_GPIO_ENABLE_INTERNAL_RESISTORS=y
          # Suppress -Werror in third-party components (esp_matter etc.)
          CONFIG_COMPILER_DISABLE_GCC_WARNINGS=y
          CONFIG_COMPILER_WARNINGS_AS_ERRORS=n
          # Disable Matter (not needed, and has Werror=format issues)
          CONFIG_ENABLE_MATTER=n
          CONFIG_ESP_MATTER_ENABLE=n
          PMEOF
          echo "=== defconfig.common (last 15 lines) ==="
          tail -15 /home/runner/work/lib-builder/configs/defconfig.common

      - name: Build ESP32-S3 IDF libs (IDF v4.4, matching PlatformIO espressif32@6.13.0 ABI)
        run: |
          cd /home/runner/work/lib-builder
          unset GITHUB_REPOSITORY_OWNER
          unset GITHUB_TOKEN
          # PlatformIO espressif32@6.13.0 uses Arduino v2.0.17 (IDF v4.4.7)
          export AR_SOURCE_BRANCH=release/v2.x
          echo "=== Phase 1: Setup (clone IDF, Arduino, components; will fail on esp-dl cmake, that's OK) ==="
          ./build.sh -t esp32s3 -I release/v4.4 -b idf_libs > /tmp/setup.log 2>&1 || true
          echo "Setup done (IDF and toolchain are now installed)."
          # Remove incompatible components (esp-dl etc. require IDF >= 5.0, not needed for PM)
          echo "=== Removing incompatible components ==="
          rm -rf components/esp-dl components/esp-rainmaker components/esp32-camera components/espressif__esp-dsp components/esp_littlefs
          # Pin TinyUSB to IDF v4.4 compatible version (latest removed usbd_control.c)
          echo "=== Pinning TinyUSB to v0.15.0 (IDF v4.4 compatible) ==="
          cd components/arduino_tinyusb/tinyusb
          git fetch --tags 2>/dev/null || true
          git checkout 0.15.0 2>/dev/null || true
          cd ../../..
          # Source IDF environment (lost when Phase 1 build.sh exited)
          echo "=== Sourcing IDF environment ==="
          . esp-idf/export.sh
          echo "=== Phase 2: Build IDF libs with PM enabled (this may take 1-2 hours) ==="
          set +e
          ./build.sh -s -t esp32s3 -b idf_libs > /tmp/build.log 2>&1 || true
          BUILD_EXIT=$?
          echo "=== BUILD LOG (head 80) ==="
          head -80 /tmp/build.log
          echo "=== BUILD LOG (tail 80) ==="
          tail -80 /tmp/build.log
          set -e
          echo "=== Build exit code: $BUILD_EXIT ==="
          ls -la out/tools/sdk/esp32s3/ 2>/dev/null || echo "No out dir"
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "=== Final sdkconfig (grep warn/error/matter/pm) ==="
            grep -i "warn\|error\|matter\|pm_enable\|pm_\|BT_CTRL" build/sdkconfig 2>/dev/null || echo "(no sdkconfig)"
            echo "=== Build error log ==="
            cat build/log/idf_py_stderr_output_* 2>/dev/null | tail -50 || echo "(no error log)"
          fi
          find build -name "libesp_system.a" 2>/dev/null | head -5
          find out -name "*.a" 2>/dev/null | head -10

      - name: Copy built libs + sdkconfig.h back to framework
        run: |
          SRC=/home/runner/work/lib-builder/out/tools/sdk/esp32s3/
          DST=tools/sdk/esp32s3/
          if [ -d "$SRC" ]; then
            echo "Found build output at $SRC"
            echo "Contents:"
            ls -la $SRC/
            for flash_mode in dio_qspi dio_opi qio_qspi qio_opi opi_qspi opi_opi; do
              if [ -d "$SRC/$flash_mode" ]; then
                rm -rf "$DST/$flash_mode"
                mkdir -p "$DST/$flash_mode"
                cp "$SRC/$flash_mode/"*.a "$DST/$flash_mode/" 2>/dev/null || true
                cp "$SRC/lib/"*.a "$DST/$flash_mode/" 2>/dev/null || true
                echo "  $flash_mode: $(ls $DST/$flash_mode/ 2>/dev/null | wc -l) libs"
              fi
            done
            # Copy sdkconfig.h to the top-level AND all flash mode include/ dirs
            # (PlatformIO uses sdkconfig.h from {flash_mode}/include/, not the top-level)
            SDKCONFIG_SRC=$(find "$SRC" -name "sdkconfig.h" 2>/dev/null | head -1)
            if [ -n "$SDKCONFIG_SRC" ] && [ -f "$SDKCONFIG_SRC" ]; then
              cp "$SDKCONFIG_SRC" "$DST/sdkconfig.h"
              echo "PM check: $(grep -c CONFIG_PM_ENABLE "$DST/sdkconfig.h" || echo 0) PM_ENABLE lines in top-level sdkconfig"
              for flash_mode in dio_qspi dio_opi qio_qspi qio_opi opi_qspi opi_opi; do
                if [ -d "$DST/$flash_mode" ]; then
                  mkdir -p "$DST/$flash_mode/include"
                  cp "$SDKCONFIG_SRC" "$DST/$flash_mode/include/sdkconfig.h"
                  echo "  $flash_mode/include/sdkconfig.h: $(grep -c CONFIG_PM_ENABLE "$DST/$flash_mode/include/sdkconfig.h" || echo 0) PM_ENABLE lines"
                fi
              done
            fi
            echo "Updated framework S3 SDK files"
          else
            echo "ERROR: Build output not found at $SRC"
            find /home/runner/work/lib-builder/out -type d 2>/dev/null | head -20
            exit 1
          fi

      - name: Commit and push updated libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/Mymetu/framework-arduinoespressif32-pm.git"
          git add tools/sdk/esp32s3/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build: recompiled S3 IDF libs with CONFIG_PM_ENABLE=y, BLE modem sleep, Tickless Idle"
            git push
            echo "Pushed updated S3 PM libs!"
          fi
